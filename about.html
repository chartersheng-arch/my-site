<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关于 | BlackShore</title>
<style>
:root{--bg:#030810;--crystal:#00d4c8;--crystal-dim:#007a73;--purple:#8b5cf6;--text:#cce4f0;--text-dim:#5a7a8a;--card-bg:rgba(0,20,35,0.7);}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",sans-serif;overflow-x:hidden;cursor:none;}
#cursor{position:fixed;width:16px;height:16px;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(0,212,200,0.9) 0%,rgba(0,212,200,0.4) 40%,transparent 70%);box-shadow:0 0 8px rgba(0,212,200,0.8),0 0 20px rgba(0,212,200,0.5),0 0 40px rgba(0,212,200,0.2);}
#cursor-trail{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);background:rgba(0,212,200,0.6);box-shadow:0 0 6px rgba(0,212,200,0.5);}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#navbar{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;z-index:200;background:rgba(3,8,16,0.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,212,200,0.06);}
.nav-logo{font-size:18px;font-weight:300;letter-spacing:6px;color:var(--crystal);text-shadow:0 0 20px rgba(0,212,200,0.4);text-decoration:none;}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{color:var(--text-dim);text-decoration:none;font-size:12px;letter-spacing:3px;transition:color 0.3s;position:relative;padding-bottom:4px;}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--crystal);transition:width 0.3s;}
.nav-links a:hover{color:var(--crystal);}
.nav-links a:hover::after{width:100%;}
.nav-links a.active{color:var(--crystal);}
.nav-links a.active::after{width:100%;}
#hero{position:relative;height:60vh;display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:1;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(0,212,200,0.07) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 30% 60%,rgba(139,92,246,0.04) 0%,transparent 60%),linear-gradient(180deg,#030810 0%,#020608 100%);}
.hero-crystal{position:absolute;width:700px;height:700px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.07;background:radial-gradient(circle,var(--crystal) 0%,transparent 70%);filter:blur(60px);animation:cp 6s ease-in-out infinite;}
@keyframes cp{0%,100%{opacity:0.07;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.14;transform:translate(-50%,-50%) scale(1.1)}}
.hero-content{position:relative;text-align:center;z-index:2;}
.hero-sub{font-size:11px;letter-spacing:12px;color:var(--crystal);opacity:0;animation:fu 1s ease 0.3s forwards;margin-bottom:20px;}
.hero-title{font-size:clamp(48px,10vw,96px);font-weight:200;letter-spacing:20px;color:#fff;opacity:0;animation:fu 1.2s ease 0.6s forwards;text-shadow:0 0 60px rgba(0,212,200,0.3);}
.hero-en{font-size:13px;letter-spacing:8px;color:var(--text-dim);margin-top:16px;opacity:0;animation:fu 1s ease 1s forwards;}
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.divider{width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(0,212,200,0.15),transparent);}
.section{position:relative;z-index:1;padding:120px 48px;max-width:900px;margin:0 auto;}
.section-label{font-size:10px;letter-spacing:6px;color:var(--crystal);margin-bottom:16px;opacity:0.6;}
.section-title{font-size:clamp(28px,5vw,42px);font-weight:200;letter-spacing:6px;color:#fff;margin-bottom:48px;}
.about-content p{font-size:15px;line-height:2.2;color:var(--text-dim);margin-bottom:24px;}
.about-card{background:var(--card-bg);border:1px solid rgba(0,212,200,0.08);border-radius:4px;padding:32px;margin-bottom:24px;}
.about-card h3{font-size:13px;letter-spacing:3px;color:var(--crystal);margin-bottom:16px;font-weight:400;}
.about-card p{font-size:14px;line-height:1.9;color:var(--text-dim);margin-bottom:12px;}
.contact-links{display:flex;gap:24px;flex-wrap:wrap;}
.contact-link{color:var(--text-dim);text-decoration:none;font-size:13px;letter-spacing:2px;padding:8px 20px;border:1px solid rgba(0,212,200,0.15);border-radius:20px;transition:all 0.3s;}
.contact-link:hover{color:var(--crystal);border-color:var(--crystal);}
footer{text-align:center;padding:60px 48px;font-size:11px;letter-spacing:3px;color:var(--text-dim);border-top:1px solid rgba(0,212,200,0.05);position:relative;z-index:1;}
footer span{color:var(--crystal);}
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.8s ease,transform 0.8s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
@media(max-width:900px){#navbar{padding:0 24px}.nav-links{gap:20px}section{padding:80px 24px}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="cursor"></div>
<div id="cursor-trail"></div>
<nav id="navbar">
  <a href="index.html" class="nav-logo">BlackShore</a>
  <ul class="nav-links">
    <a href="index.html">首页</a>
    <a href="works.html">作品</a>
    <a href="blog.html">博客</a>
    <a href="about.html" class="active">关于</a>
  </ul>
</nav>
<div id="hero">
  <div class="hero-bg"></div>
  <div class="hero-crystal"></div>
  <div class="hero-content">
    <div class="hero-sub">CREATOR</div>
    <h1 class="hero-title">关于</h1>
    <div class="hero-en">ABOUT ME</div>
  </div>
</div>
<div class="divider"></div>
<section class="section">
  <div class="about-content reveal">
    <div class="section-label">WHO AM I</div>
    <div class="section-title">我是谁</div>
    <p>你好，我是一名创作者，在技术与设计的交汇处探索。BlackShore 是我的数字空间，承载着每一次创作的热情与思考。</p>
    <p>我相信好的创作源于对生活的热爱。代码可以是诗，界面可以是画，而每一个产品背后，都是对细节的执着与追求。</p>
  </div>
  <div class="divider" style="margin:60px 0"></div>
  <div class="about-card reveal">
    <h3>技能 & 工具</h3>
    <p>前端开发 · 界面设计 · 工具搭建 · 内容创作</p>
  </div>
  <div class="about-card reveal" style="transition-delay:0.1s">
    <h3>联系方式</h3>
    <div class="contact-links">
      <a href="mailto:chartersheng@gmail.com" class="contact-link">Email</a>
      <a href="https://github.com/chartersheng-arch" class="contact-link">GitHub</a>
    </div>
  </div>
</section>
<footer>
  <p>BLACKSHORE · <span>数字海岸</span> · 创作者空间</p>
</footer>
<script>
const cursor=document.getElementById('cursor'),trail=document.getElementById('cursor-trail');
let tx=0,ty=0;
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';tx+=(e.clientX-tx)*0.15;ty+=(e.clientY-ty)*0.15;trail.style.left=tx+'px';trail.style.top=ty+'px';});
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
function rz(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
rz();window.addEventListener('resize',rz);
const ps=[];
for(let i=0;i<30;i++)ps.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.5,vx:(Math.random()-0.5)*0.3,vy:-Math.random()*0.5-0.1,alpha:Math.random()*0.5+0.1,color:Math.random()>0.3?'#00d4c8':'#8b5cf6'});
(function df(){ctx.clearRect(0,0,canvas.width,canvas.height);ps.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.alpha;ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}});ctx.globalAlpha=1;requestAnimationFrame(df);})();
const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
</body>
</html>
