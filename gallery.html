#gallery-page{position:relative;z-index:1;padding:100px 48px 80px;max-width:1400px;margin:0 auto;}
.gallery-meta{font-size:11px;letter-spacing:3px;color:var(--text-dim);margin-bottom:40px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.gallery-item{position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:var(--card-bg);border:1px solid rgba(0,212,200,0.08);cursor:none;opacity:0;transform:translateY(16px);transition:opacity 0.5s,transform 0.5s,border-color 0.3s;}
.gallery-item.visible{opacity:1;transform:translateY(0);}
.gallery-item:hover{border-color:rgba(0,212,200,0.35);}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease;}
.gallery-item:hover img{transform:scale(1.04);}
.gallery-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,8,16,0.8) 0%,transparent 50%);opacity:0;transition:opacity 0.3s;display:flex;align-items:flex-end;padding:16px;}
.gallery-item:hover .gallery-item-overlay{opacity:1;}
.gallery-item-overlay span{font-size:11px;letter-spacing:2px;color:var(--crystal);}
@media(max-width:768px){#gallery-page{padding-left:24px;padding-right:24px}.gallery-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
</style>

const grid=document.getElementById('galleryGrid');
const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:0.05});
picNames.forEach((name,i)=>{
  const item=document.createElement('div');
  item.className='gallery-item';
  item.innerHTML=`<img src="${picDir}${encodeURIComponent(name)}" alt="gallery-${i}" onerror="this.parentElement.style.display='none'" /><div class="gallery-item-overlay"><span>守岸人 · ${i+1}</span></div>`;
  item.addEventListener('click',()=>openL(i));
  grid.appendChild(item);
  setTimeout(()=>io.observe(item),i*30);
});
const lightbox=document.getElementById('lightbox');
let ci=0;
function show(i){ci=i;document.getElementById('lbImg').src=picDir+encodeURIComponent(picNames[i]);document.getElementById('lbCounter').textContent=`${i+1} / ${picNames.length}`;}
function openL(i){show(i);lightbox.style.display='flex';document.body.style.overflow='hidden';}
function closeL(){lightbox.style.display='none';document.body.style.overflow='';}
document.getElementById('lbClose').addEventListener('click',closeL);
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeL();});
document.getElementById('lbPrev').addEventListener('click',e=>{e.stopPropagation();show((ci-1+picNames.length)%picNames.length);});
document.getElementById('lbNext').addEventListener('click',e=>{e.stopPropagation();show((ci+1)%picNames.length);});
document.addEventListener('keydown',e=>{if(lightbox.style.display==='none')return;if(e.key==='Escape')closeL();if(e.key==='ArrowLeft')show((ci-1+picNames.length)%picNames.length);if(e.key==='ArrowRight')show((ci+1)%picNames.length);});
