<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花房 · 图集 | BlackShore</title>
<link rel="stylesheet" href="_css/style.css">
<style>
#gallery-page{position:relative;z-index:1;padding:100px 48px 80px;max-width:1400px;margin:0 auto;}
.gallery-meta{font-size:11px;letter-spacing:3px;color:var(--text-dim);margin-bottom:40px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.gallery-item{position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:var(--card-bg);border:1px solid rgba(0,212,200,0.08);opacity:0;transform:translateY(16px);transition:opacity 0.5s,transform 0.5s,border-color 0.3s;}
.gallery-item.visible{opacity:1;transform:translateY(0);}
.gallery-item:hover{border-color:rgba(0,212,200,0.35);}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease;}
.gallery-item:hover img{transform:scale(1.04);}
.gallery-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,8,16,0.8) 0%,transparent 50%);opacity:0;transition:opacity 0.3s;display:flex;align-items:flex-end;padding:16px;}
.gallery-item:hover .gallery-item-overlay{opacity:1;}
.gallery-item-overlay span{font-size:11px;letter-spacing:2px;color:var(--crystal);}
@media(max-width:768px){#gallery-page{padding-left:24px;padding-right:24px}.gallery-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="cursor"></div><div id="cursor-dot"></div>

<nav id="navbar"><a href="index.html" class="nav-logo">BlackShore</a><div id="nav-music"><button id="musicToggle" title="播放背景音乐">♪</button><span id="musicTitle">繁星、新生，与你</span></div><ul class="nav-links">
    <a href="index.html">新枝地</a>
    <a href="character.html">星海</a>
    <a href="gallery.html" class="active">花房</a>
    <a href="music.html">眠音灯塔</a>
    <a href="creations.html">残响回廊</a>
    <a href="chat.html">漂泊的终点</a>
    <a href="more.html">时空裂隙</a>
  </ul></nav>

<div style="position:relative;z-index:1;padding:120px 48px 0;max-width:1400px;margin:0 auto;">
  <div class="section-label">GALLERY</div>
  <div class="section-title">花房图集</div>
  <div class="gallery-meta" id="galleryMeta">珍藏的每一帧画面</div>
</div>

<div id="gallery-page">
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<footer>
  <p>BLACKSHORE · <span>黑海岸</span> · 守望者的数字空间</p>
</footer>

<div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(3,8,16,0.96);z-index:1000;align-items:center;justify-content:center;flex-direction:column;">
  <div id="lbClose" style="position:fixed;top:28px;right:36px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(0,212,200,0.25);display:flex;align-items:center;justify-content:center;color:var(--crystal);font-size:18px;">✕</div>
  <img id="lbImg" style="max-width:90vw;max-height:88vh;object-fit:contain;border-radius:4px;box-shadow:0 0 80px rgba(0,212,200,0.15);" />
  <div style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:16px;">
    <button id="lbPrev" style="background:rgba(0,20,35,0.85);border:1px solid rgba(0,212,200,0.2);color:var(--crystal);padding:8px 20px;border-radius:20px;font-size:11px;letter-spacing:2px;transition:all 0.2s;">◀ PREV</button>
    <span id="lbCounter" style="font-size:11px;letter-spacing:3px;color:var(--text-dim);"></span>
    <button id="lbNext" style="background:rgba(0,20,35,0.85);border:1px solid rgba(0,212,200,0.2);color:var(--crystal);padding:8px 20px;border-radius:20px;font-size:11px;letter-spacing:2px;transition:all 0.2s;">NEXT ▶</button>
  </div>
</div>

<script src="_js/main.js"></script>
<script>
const canvas=document.getElementById('particles'),ctx=canvas&&canvas.getContext('2d');
if(canvas&&ctx){
  function rz(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  rz();window.addEventListener('resize',rz);
  const ps=[];
  for(let i=0;i<25;i++)ps.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.5,vx:(Math.random()-0.5)*0.3,vy:-Math.random()*0.5-0.1,alpha:Math.random()*0.4+0.1,color:'#00d4c8'});
  (function df(){ctx.clearRect(0,0,canvas.width,canvas.height);ps.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.alpha;ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}});ctx.globalAlpha=1;requestAnimationFrame(df);})();
}
const picDir='https://raw.githubusercontent.com/chartersheng-arch/gallery-assets/main/';
const picNames=[
  '001.jpg',
  '002.jpg',
  '003.jpg',
  '004.jpg',
  '005.jpg',
  '006.jpg',
  '007.jpg',
  '008.jpg',
  '009.jpg',
  '010.jpg',
  '011.jpg',
  '012.jpg',
  '013.png',
  '014.jpg',
  '015.jpg',
  '016.jpg',
  '017.jpg',
  '018.jpg',
  '019.webp',
  '020.webp',
  '021.webp',
  '022.webp',
  '023.webp',
  '024.webp',
  '025.webp',
  '026.webp',
  '027.webp',
  '028.webp',
  '029.webp',
  '030.webp',
  '031.webp',
  '032.webp',
  '033.webp',
  '034.webp',
  '035.webp',
  '036.webp',
  '037.webp',
  '038.webp',
  '039.webp',
  '040.webp',
  '041.webp',
  '042.webp',
  '043.webp',
  '044.webp',
  '045.webp',
  '046.webp',
  '047.webp',
  '048.webp',
  '049.webp',
  '050.webp',
  '051.webp',
  '052.webp',
  '053.webp',
  '054.webp',
  '055.webp',
  '056.webp',
  '057.webp',
  '058.webp',
  '059.webp',
  '060.webp'
];
document.getElementById('galleryMeta').textContent=`共 ${picNames.length} 张图片`;
const grid=document.getElementById('galleryGrid');
const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:0.05});
picNames.forEach((name,i)=>{
  const item=document.createElement('div');
  item.className='gallery-item';
  item.innerHTML=`<img src="${picDir}${encodeURIComponent(name)}" alt="gallery-${i}" onerror="this.parentElement.style.display='none'" /><div class="gallery-item-overlay"><span>守岸人 · ${i+1}</span></div>`;
  item.addEventListener('click',()=>openL(i));
  grid.appendChild(item);
  setTimeout(()=>io.observe(item),i*30);
});
const lightbox=document.getElementById('lightbox');
let ci=0;
function show(i){ci=i;document.getElementById('lbImg').src=picDir+encodeURIComponent(picNames[i]);document.getElementById('lbCounter').textContent=`${i+1} / ${picNames.length}`;}
function openL(i){show(i);lightbox.style.display='flex';document.body.style.overflow='hidden';}
function closeL(){lightbox.style.display='none';document.body.style.overflow='';}
document.getElementById('lbClose').addEventListener('click',closeL);
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeL();});
document.getElementById('lbPrev').addEventListener('click',e=>{e.stopPropagation();show((ci-1+picNames.length)%picNames.length);});
document.getElementById('lbNext').addEventListener('click',e=>{e.stopPropagation();show((ci+1)%picNames.length);});
document.addEventListener('keydown',e=>{if(lightbox.style.display==='none')return;if(e.key==='Escape')closeL();if(e.key==='ArrowLeft')show((ci-1+picNames.length)%picNames.length);if(e.key==='ArrowRight')show((ci+1)%picNames.length);});
(function(){var c=document.getElementById('cursor'),cd=document.getElementById('cursor-dot');document.addEventListener('mousemove',function(e){if(c){c.style.left=e.clientX+'px';c.style.top=e.clientY+'px';c.style.opacity='1';}if(cd){cd.style.left=e.clientX+'px';cd.style.top=e.clientY+'px';cd.style.opacity='1';}});document.addEventListener('mouseleave',function(){if(c)c.style.opacity='0';if(cd)cd.style.opacity='0';});document.addEventListener('mouseenter',function(){if(c)c.style.opacity='1';if(cd)cd.style.opacity='1';});})();
</script>
</body>
</html>
