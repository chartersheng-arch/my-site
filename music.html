<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>眠音灯塔 · 音乐电台 | BlackShore</title>
<link rel="stylesheet" href="_css/style.css">
<style>
.music-section{position:relative;z-index:1;padding:120px 48px;max-width:900px;margin:0 auto;}
.music-intro{background:var(--card-bg);border:1px solid rgba(0,212,200,0.08);border-radius:4px;padding:32px;text-align:center;margin-bottom:48px;}
.music-intro p{font-size:14px;line-height:2;color:var(--text-dim);}
.music-note{font-size:12px;letter-spacing:3px;color:var(--crystal);opacity:0.7;margin-top:16px;}
.soundwave{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:60px;margin:32px 0;}
.soundwave span{display:width:4px;background:var(--crystal);border-radius:2px;opacity:0.6;animation:sw 1.2s ease-in-out infinite;}
.soundwave span:nth-child(1){animation-delay:0s;height:20px;}
.soundwave span:nth-child(2){animation-delay:0.1s;height:35px;}
.soundwave span:nth-child(3){animation-delay:0.2s;height:50px;}
.soundwave span:nth-child(4){animation-delay:0.3s;height:40px;}
.soundwave span:nth-child(5){animation-delay:0.4s;height:55px;}
.soundwave span:nth-child(6){animation-delay:0.5s;height:30px;}
.soundwave span:nth-child(7){animation-delay:0.6s;height:45px;}
.soundwave span:nth-child(8){animation-delay:0.7s;height:25px;}
@keyframes sw{0%,100%{transform:scaleY(0.4);opacity:0.4}50%{transform:scaleY(1);opacity:0.8}}
.music-links{display:flex;flex-direction:column;gap:16px;max-width:400px;margin:0 auto;}
.music-link{background:var(--card-bg);border:1px solid rgba(0,212,200,0.08);border-radius:4px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;text-decoration:none;transition:border-color 0.3s,transform 0.3s;}
.music-link:hover{border-color:rgba(0,212,200,0.3);transform:translateX(4px);}
.music-link-title{font-size:13px;letter-spacing:3px;color:#fff;}
.music-link-desc{font-size:11px;color:var(--text-dim);margin-top:4px;}
.music-link-arrow{font-size:18px;color:var(--crystal);opacity:0.6;}
</style>
</head>
